<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Founder's Playbook — Learning Tool</title>
<style>
  :root {
    --bg: #fafaf8;
    --text: #1a1a1a;
    --text-secondary: #555;
    --accent: #d4770a;
    --accent-soft: #fef3e4;
    --border: #e8e5e0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1917;
      --text: #e8e6e0;
      --text-secondary: #9d978b;
      --accent: #f0a040;
      --accent-soft: #2d2618;
      --border: #383530;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 800;
    letter-spacing: -.01em;
    margin-bottom: 10px;
  }
  .subtitle {
    color: var(--text-secondary);
    font-size: 16px;
    margin-bottom: 48px;
    max-width: 500px;
  }

  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    background: var(--accent-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 40px;
    min-width: 220px;
    text-decoration: none;
    color: var(--text);
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
  }
  .card .lang {
    font-size: 40px;
    margin-bottom: 10px;
  }
  .card .label {
    font-size: 20px;
    font-weight: 700;
  }
  .card .desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  .footer {
    margin-top: 60px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>The Founder's Playbook</h1>
<p class="subtitle">Building an AI-Native Startup — An interactive learning tool based on the book by Anthropic</p>

<div class="cards">
  <a href="zh.html" class="card">
    <div class="lang"></div>
    <div class="label">中文版</div>
    <div class="desc">Chinese Edition</div>
  </a>
  <a href="en.html" class="card">
    <div class="lang"></div>
    <div class="label">English</div>
    <div class="desc">Original Language</div>
  </a>
</div>

<p class="footer">
  <a href="https://github.com/SwiftSteed/building-ai-native-startup">GitHub</a>
  &nbsp;·&nbsp;
  By <a href="https://claude.ai">Anthropic</a>
</p>

</body>
</html>
